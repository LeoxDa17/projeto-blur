<!-- login.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StreetWear</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="brand">
                <h1>STREET<span>WEAR</span></h1>
                <p>Entre para acessar as melhores peças</p>
            </div>

            <!-- Modificação importante: adicionado onsubmit="return false" -->
            <form id="loginForm" class="login-form" onsubmit="return false">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Seu email" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Sua senha" required>
                    <i class="fas fa-eye" id="togglePassword"></i>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox" id="remember">
                        Lembrar de mim
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <!-- Modificação importante: mudado para type="button" -->
                <button type="button" id="loginButton" class="login-btn">
                    <span>ENTRAR</span>
                    <i class="fas fa-arrow-right"></i>
                </button>

                <div class="social-login">
                    <p>Ou entre com</p>
                    <div class="social-buttons">
                        <button type="button" class="google-btn">
                            <i class="fab fa-google"></i>
                        </button>
                        <button type="button" class="facebook-btn">
                            <i class="fab fa-facebook-f"></i>
                        </button>
                    </div>
                </div>


                <p class="register-link">
                    Não tem uma conta? <a href="register.html">Cadastre-se</a>
                </p>
                                <p class="register-link">
                    Não tem uma conta? <a href="../index.html">Entre sem login</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        // Script inline para garantir que funcione
        document.addEventListener('DOMContentLoaded', () => {
            const loginButton = document.getElementById('loginButton');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const togglePassword = document.getElementById('togglePassword');

            // Toggle password visibility
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePassword.classList.toggle('fa-eye');
                togglePassword.classList.toggle('fa-eye-slash');
            });

            // Login handler
            loginButton.addEventListener('click', () => {
                const email = emailInput.value;
                const password = passwordInput.value;

                // Validação básica
                if (!email || !password) {
                    alert('Por favor, preencha todos os campos');
                    return;
                }

                // Criar usuário de teste se não existir
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                if (users.length === 0) {
                    users.push({
                        name: 'Teste',
                        email: 'teste@teste.com',
                        password: '123456'
                    });
                    localStorage.setItem('users', JSON.stringify(users));
                }

                // Procurar usuário
                const user = users.find(u => u.email === email && u.password === password);

                if (user) {
                    // Login bem sucedido
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    
                    // Redirecionar
                    console.log('Login bem sucedido, redirecionando...');
                    
                    // Tentar diferentes métodos de redirecionamento
                    try {
                        window.location.replace('../index.html');
                    } catch (error) {
                        console.error('Erro no primeiro método:', error);
                        try {
                            window.location.href = '../index.html';
                        } catch (error) {
                            console.error('Erro no segundo método:', error);
                            try {
                                document.location.href = '../index.html';
                            } catch (error) {
                                console.error('Erro no terceiro método:', error);
                                alert('Erro ao redirecionar. Por favor, tente novamente.');
                            }
                        }
                    }
                } else {
                    alert('Email ou senha incorretos!');
                }
            });
        });
    </script>
</body>
</html>
