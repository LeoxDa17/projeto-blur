            <script>
   document.addEventListener('DOMContentLoaded', () => {
    // Verificar se usuário está logado
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    const userInfo = document.querySelector('.user-info');
    const loginBtn = document.querySelector('.login-btn');
    
    if (currentUser) {
        // Mostrar informações do usuário
        userInfo.style.display = 'inline-flex';
        loginBtn.style.display = 'none';
        
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const favoritesCount = document.getElementById('favoritesCount');
        
        // Configurar avatar e informações
        userAvatar.textContent = currentUser.name.charAt(0).toUpperCase();
        userName.textContent = currentUser.name;
        userEmail.textContent = currentUser.email;

        // Atualizar contador de favoritos
        const favorites = JSON.parse(localStorage.getItem(`favorites_${currentUser.email}`) || '[]');
        favoritesCount.textContent = favorites.length;

        // Toggle dropdown
        userAvatar.addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('userDropdown').classList.toggle('active');
        });

        // Fechar dropdown quando clicar fora
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.user-info')) {
                document.getElementById('userDropdown').classList.remove('active');
            }
        });

        // Adicionar eventos de clique para os itens do menu
        document.querySelectorAll('.user-dropdown-items li').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                const action = item.textContent.trim().toLowerCase();
                
                switch(action) {
                    case 'favoritos':
                        window.location.href = 'pages/favorites.html';
                        break;
                    case 'sair':
                        logout();
                        break;
                    // Adicione mais casos conforme necessário
                }
            });
        });

    } else {
        userInfo.style.display = 'none';
        loginBtn.style.display = 'inline-block';
    }
});

// Função de logout
function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'pages/login.html';
}

// Função para ir para favoritos (pode ser chamada de qualquer lugar)
function goToFavorites() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (currentUser) {
        window.location.href = 'pages/favorites.html';
    } else {
        alert('Faça login para ver seus favoritos');
        window.location.href = 'pages/login.html';
    }
}
    </script>
    <script src="../js/product-detail.js"></script>
    <script src="../js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar se usuário está logado
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            // Carregar favoritos do localStorage
            const favorites = JSON.parse(localStorage.getItem(`favorites_${currentUser.email}`) || '[]');
            const favoritesGrid = document.getElementById('favoritesGrid');

            if (favorites.length === 0) {
                // Mostrar mensagem quando não há favoritos
                favoritesGrid.innerHTML = `
                    <div class="empty-favorites">
                        <i class="far fa-heart"></i>
                        <h2>Sua lista de favoritos está vazia</h2>
                        <p>Explore nossa coleção e adicione itens aos seus favoritos</p>
                        <a href="products.html" class="browse-products-btn">
                            Ver Produtos
                        </a>
                    </div>
                `;
                return;
            }

            // Renderizar favoritos
            favoritesGrid.innerHTML = favorites.map(item => `
                <div class="favorite-card" data-id="${item.id}">
                    <div class="favorite-image">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="favorite-info">
                        <h3 class="favorite-name">${item.name}</h3>
                        <p class="favorite-price">R$ ${item.price.toFixed(2)}</p>
                        <div class="favorite-actions">
                            <button class="action-btn remove-favorite-btn" onclick="removeFavorite(${item.id})">
                                <i class="fas fa-trash"></i>
                                Remover
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        });

        function removeFavorite(productId) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            let favorites = JSON.parse(localStorage.getItem(`favorites_${currentUser.email}`) || '[]');
            
            favorites = favorites.filter(item => item.id !== productId);
            localStorage.setItem(`favorites_${currentUser.email}`, JSON.stringify(favorites));
            
            // Recarregar a página para atualizar a lista
            location.reload();
        }

        function getFavoriteById(id) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const favorites = JSON.parse(localStorage.getItem(`favorites_${currentUser.email}`) || '[]');
            return favorites.find(item => item.id === id);
        }
    </script>
