<!-- register.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - StreetWear Store</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="brand">
                <h1>STREET<span>WEAR</span></h1>
                <p>Crie sua conta para acessar as melhores peças</p>
            </div>

            <form id="registerForm" class="register-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="name" placeholder="Nome completo" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Seu melhor email" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Crie uma senha" required>
                    <i class="fas fa-eye" id="togglePassword"></i>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirme sua senha" required>
                    <i class="fas fa-eye" id="toggleConfirmPassword"></i>
                </div>

                <div class="terms">
                    <label>
                        <input type="checkbox" id="terms" required>
                        Li e aceito os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>
                    </label>
                </div>

                <button type="submit" class="register-btn">
                    <span>CRIAR CONTA</span>
                    <i class="fas fa-arrow-right"></i>
                </button>

                <div class="social-register">
                    <p>Ou cadastre-se com</p>
                    <div class="social-buttons">
                        <button type="button" class="google-btn">
                            <i class="fab fa-google"></i>
                        </button>
                        <button type="button" class="facebook-btn">
                            <i class="fab fa-facebook-f"></i>
                        </button>
                    </div>
                </div>

                <p class="login-link">
                    Já tem uma conta? <a href="../pages/login.html">Faça login</a>
                </p>
            </form>
        </div>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>
